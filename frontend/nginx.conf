# ──────────────────────────────────────────────────────────────
# HTTP — serve ACME renewal challenges, redirect everything to HTTPS
# ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name codetouml.in www.codetouml.in;

    # Let's Encrypt webroot (used by certbot renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────────
# HTTPS — serve the Angular app and proxy /api to the backend
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name codetouml.in www.codetouml.in;

    ssl_certificate     /etc/letsencrypt/live/codetouml.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codetouml.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # API → Spring Boot backend over the internal Docker network.
    # The frontend uses a relative "/api" base, so only ports 80/443 are public.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Hashed Angular assets — cache hard
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Angular HTML5 routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
