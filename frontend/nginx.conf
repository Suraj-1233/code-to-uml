server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Cache static assets aggressively (hashed filenames from Angular build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Angular HTML5 pushState routing — fallback to index.html
    # Note: API calls go directly from Angular to the backend Railway URL
    # (configured via environment.apiUrl at build time — no Nginx proxy needed)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
