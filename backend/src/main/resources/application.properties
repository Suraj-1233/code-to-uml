server.port=8080
spring.application.name=code-to-uml

# Allow larger pasted snippets
spring.servlet.multipart.max-request-size=2MB
spring.mvc.async.request-timeout=30000

# Diagram layout engine: "smetana" (pure-Java, no Graphviz) or "dot" (Graphviz — robust for big repos).
# Local dev defaults to smetana; the production image installs Graphviz and sets UML_LAYOUT=dot.
uml.layout=${UML_LAYOUT:smetana}

# Google Sign-In — the OAuth client ID (public; override via GOOGLE_CLIENT_ID env in prod)
google.client-id=${GOOGLE_CLIENT_ID:266952244092-44f7ite9ov7r19ctds4pdsrgpv5qm2kk.apps.googleusercontent.com}

# Saved-diagram store — file-based H2. DB_PATH points at a mounted volume in production
# so a user's history survives redeploys.
spring.datasource.url=jdbc:h2:file:${DB_PATH:./data/diagrams}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
